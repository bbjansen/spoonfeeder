<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="spoonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" ry="16" fill="#0f172a" />

  <!-- Subtle gradient overlay in top-left -->
  <rect width="400" height="200" rx="16" ry="16" fill="url(#bgGlow)" />

  <!-- Grid dots pattern (subtle) -->
  <g fill="#1e293b" opacity="0.7">
    <!-- Row 1 -->
    <circle cx="640" cy="30" r="1.2" />
    <circle cx="660" cy="30" r="1.2" />
    <circle cx="680" cy="30" r="1.2" />
    <circle cx="700" cy="30" r="1.2" />
    <circle cx="720" cy="30" r="1.2" />
    <circle cx="740" cy="30" r="1.2" />
    <circle cx="760" cy="30" r="1.2" />
    <!-- Row 2 -->
    <circle cx="640" cy="50" r="1.2" />
    <circle cx="660" cy="50" r="1.2" />
    <circle cx="680" cy="50" r="1.2" />
    <circle cx="700" cy="50" r="1.2" />
    <circle cx="720" cy="50" r="1.2" />
    <circle cx="740" cy="50" r="1.2" />
    <circle cx="760" cy="50" r="1.2" />
    <!-- Row 3 -->
    <circle cx="640" cy="70" r="1.2" />
    <circle cx="660" cy="70" r="1.2" />
    <circle cx="680" cy="70" r="1.2" />
    <circle cx="700" cy="70" r="1.2" />
    <circle cx="720" cy="70" r="1.2" />
    <circle cx="740" cy="70" r="1.2" />
    <circle cx="760" cy="70" r="1.2" />
    <!-- Row 4 -->
    <circle cx="640" cy="90" r="1.2" />
    <circle cx="660" cy="90" r="1.2" />
    <circle cx="680" cy="90" r="1.2" />
    <circle cx="700" cy="90" r="1.2" />
    <circle cx="720" cy="90" r="1.2" />
    <circle cx="740" cy="90" r="1.2" />
    <circle cx="760" cy="90" r="1.2" />
    <!-- Row 5 -->
    <circle cx="640" cy="110" r="1.2" />
    <circle cx="660" cy="110" r="1.2" />
    <circle cx="680" cy="110" r="1.2" />
    <circle cx="700" cy="110" r="1.2" />
    <circle cx="720" cy="110" r="1.2" />
    <circle cx="740" cy="110" r="1.2" />
    <circle cx="760" cy="110" r="1.2" />
    <!-- Row 6 -->
    <circle cx="640" cy="130" r="1.2" />
    <circle cx="660" cy="130" r="1.2" />
    <circle cx="680" cy="130" r="1.2" />
    <circle cx="700" cy="130" r="1.2" />
    <circle cx="720" cy="130" r="1.2" />
    <circle cx="740" cy="130" r="1.2" />
    <circle cx="760" cy="130" r="1.2" />
    <!-- Row 7 -->
    <circle cx="640" cy="150" r="1.2" />
    <circle cx="660" cy="150" r="1.2" />
    <circle cx="680" cy="150" r="1.2" />
    <circle cx="700" cy="150" r="1.2" />
    <circle cx="720" cy="150" r="1.2" />
    <circle cx="740" cy="150" r="1.2" />
    <circle cx="760" cy="150" r="1.2" />
    <!-- Row 8 -->
    <circle cx="640" cy="170" r="1.2" />
    <circle cx="660" cy="170" r="1.2" />
    <circle cx="680" cy="170" r="1.2" />
    <circle cx="700" cy="170" r="1.2" />
    <circle cx="720" cy="170" r="1.2" />
    <circle cx="740" cy="170" r="1.2" />
    <circle cx="760" cy="170" r="1.2" />
  </g>

  <!-- Spoon icon — top-down view, vertically centered -->
  <g transform="translate(72, 100)" opacity="0.95">
    <!-- Spoon bowl — wide oval at top -->
    <ellipse cx="0" cy="-30" rx="20" ry="28" fill="url(#spoonGrad)" />
    <!-- Inner bowl highlight -->
    <ellipse cx="0" cy="-32" rx="14" ry="20" fill="#0f172a" opacity="0.3" />
    <!-- Handle — straight rounded rectangle -->
    <rect x="-5" y="-4" width="10" height="58" rx="5" fill="url(#spoonGrad)" />
  </g>

  <!-- Code bracket accents flanking the spoon -->
  <g stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.35">
    <path d="M40 75 L34 75 L34 125 L40 125" />
    <path d="M104 75 L110 75 L110 125 L104 125" />
  </g>

  <!-- Main wordmark -->
  <text
    x="140"
    y="114"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="58"
    font-weight="700"
    letter-spacing="-1.5"
    fill="url(#textGrad)"
  >spoonfeeder</text>

  <!-- Tagline -->
  <text
    x="141"
    y="146"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="16"
    font-weight="400"
    letter-spacing="2"
    fill="#94a3b8"
  >NESTJS PROJECT SCAFFOLDER</text>

  <!-- Thin gradient accent line under tagline -->
  <rect x="141" y="155" width="200" height="1.5" rx="1" fill="url(#textGrad)" opacity="0.5" />
</svg>
